<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestione Costi | Elenco Strutturato</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>

<style>
body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg,#f5f7fa,#c3cfe2); }
.apple-glass { background: rgba(255,255,255,0.4); backdrop-filter: blur(20px); border-radius: 2rem; }
.table-row:hover { background: rgba(255,255,255,0.5); }
.text-negative { color:#dc2626; }
.text-positive { color:#059669; }
.collapsed-content { display:none; }
.rotate-icon { transition:0.3s; }
.is-open .rotate-icon { transform:rotate(90deg); }
.btn-edit {
    background:#10b981;
    color:white;
    padding:6px 10px;
    border-radius:8px;
    font-size:12px;
    font-weight:bold;
    cursor:pointer;
}
.btn-edit:hover { background:#059669; }
</style>
</head>

<body class="p-6">

<div id="accordion-container"></div>

<script>
const SB_URL = 'https://wleaywzitgcenbhumhov.supabase.co'; 
const SB_KEY = 'YOUR_KEY';
const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

let datiOriginali = [];
const nomiMesi = ["Gennaio","Febbraio","Marzo","Aprile","Maggio","Giugno","Luglio","Agosto","Settembre","Ottobre","Novembre","Dicembre"];

async function init(){
    const { data } = await supabaseClient.from('gestione_costi').select('*');
    datiOriginali = data || [];
    renderAccordion(datiOriginali);
}

function isPrelievo(item){
    const d = (item.descrizione || "").toLowerCase();
    const t = (item.tipologia || "").toLowerCase();
    return d.includes("prelievo") || t.includes("prelievo");
}

function toggle(id){
    const el = document.getElementById(id);
    el.classList.toggle("collapsed-content");
    el.previousElementSibling.classList.toggle("is-open");
}

function vaiAModifica(id, event){
    if(event){
        event.stopPropagation();
        event.preventDefault();
    }
    console.log("Apro modifica:", id);

    // FIX DEFINITIVO
    window.open("modifica_spesa.html?id=" + id, "_self");
}

function renderAccordion(costi){
    const container = document.getElementById('accordion-container');
    container.innerHTML = "";

    const tree = {};

    costi.forEach(item=>{
        const d = new Date(item.data_spesa);
        const y = d.getFullYear();
        const m = d.getMonth()+1;

        if(!tree[y]) tree[y] = {};
        if(!tree[y][m]) tree[y][m] = [];
        tree[y][m].push(item);
    });

    Object.keys(tree).sort((a,b)=>b-a).forEach(year=>{
        let html = `<div>
        <div onclick="toggle('y${year}')" class="apple-glass p-4 mb-2 cursor-pointer">
        <b>${year}</b>
        </div>
        <div id="y${year}" class="collapsed-content">`;

        Object.keys(tree[year]).sort((a,b)=>b-a).forEach(month=>{
            const spese = tree[year][month];

            const speso = spese
                .filter(i => i.importo < 0 && !isPrelievo(i))
                .reduce((a,b)=>a+Math.abs(b.importo),0);

            html += `<div>
            <div onclick="toggle('m${year}${month}')" class="apple-glass p-3 m-2 cursor-pointer">
            ${nomiMesi[month-1]} - Totale: € ${speso.toFixed(2)}
            </div>

            <div id="m${year}${month}" class="collapsed-content">

            <table class="w-full bg-white">
            <tr>
            <th>Data</th><th>Descrizione</th><th>Importo</th><th>Azioni</th>
            </tr>`;

            spese.forEach(i=>{
                const prelievo = isPrelievo(i);

                html += `<tr class="${prelievo ? 'bg-yellow-50' : ''}">
                <td>${i.data_spesa}</td>
                <td>
                    ${i.descrizione || ''}
                    ${prelievo ? '<br><small>ESCLUSO DAL TOTALE</small>' : ''}
                </td>
                <td class="${prelievo ? '' : (i.importo<0?'text-negative':'text-positive')}">
                    € ${i.importo}
                </td>
                <td>
                    <button class="btn-edit" onclick="vaiAModifica('${i.id}', event)">
                        Modifica
                    </button>
                </td>
                </tr>`;
            });

            html += "</table></div></div>";
        });

        html += "</div></div>";
        container.innerHTML += html;
    });
}

init();
</script>

</body>
</html>
