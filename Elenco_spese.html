<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestione Costi | Elenco & Budget</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            background: radial-gradient(circle at top left, #0f172a, #020617);
            color: #f8fafc; min-height: 100vh;
        }
        .apple-glass {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .budget-bar-bg { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255,255,255,0.1); }
        .progress-fill { transition: width 1s cubic-bezier(0.4, 0, 0.2, 1), background-color 0.5s; }
        
        select { background: rgba(255, 255, 255, 0.05) !important; color: white !important; border: 1px solid rgba(255,255,255,0.1) !important; }
        .table-row:hover { background: rgba(255, 255, 255, 0.05); }
        .hidden-section { display: none !important; }
        .text-positive { color: #10b981 !important; }
        .text-negative { color: #ef4444 !important; }
    </style>
</head>
<body class="p-4 md:p-12">

<div class="max-w-7xl mx-auto">
    <div class="flex flex-col md:flex-row items-center justify-between mb-8 gap-6">
        <div>
            <h1 class="text-3xl font-black uppercase tracking-tighter text-emerald-500">Gestione <span class="text-white">Costi</span></h1>
            <p class="text-slate-500 text-xs font-bold uppercase tracking-widest">Archivio & Controllo Budget</p>
        </div>
        <div class="flex flex-wrap justify-center gap-3">
            <button onclick="exportToExcel()" class="bg-blue-600 hover:bg-blue-500 text-white px-5 py-2.5 rounded-xl font-bold text-[10px] uppercase transition-all shadow-lg shadow-blue-900/20">
                <i class="fas fa-file-excel mr-2"></i> Export
            </button>
            <a href="Nuova_spesa.html" class="bg-emerald-600 hover:bg-emerald-500 text-white px-5 py-2.5 rounded-xl font-bold text-[10px] uppercase transition-all shadow-lg shadow-emerald-900/20">
                <i class="fas fa-plus mr-2"></i> Nuova Spesa
            </a>
        </div>
    </div>

    <div class="apple-glass rounded-[2rem] p-8 mb-8 relative overflow-hidden">
        <div class="flex justify-between items-end mb-4">
            <div>
                <h3 id="budget-title" class="text-xs font-black uppercase tracking-[0.2em] text-slate-400 mb-1">Budget Mensile Totale</h3>
                <div class="flex items-baseline gap-2">
                    <span id="label-speso" class="text-3xl font-black text-white">€ 0,00</span>
                    <span id="label-totale-budget" class="text-slate-500 font-bold text-sm">su € 0,00</span>
                </div>
            </div>
            <button onclick="impostaBudget()" class="text-[10px] font-black uppercase text-emerald-500 hover:text-emerald-400 transition-colors">
                <i class="fas fa-pen mr-1"></i> Modifica Budget
            </button>
        </div>
        
        <div class="w-full h-4 budget-bar-bg rounded-full overflow-hidden">
            <div id="budget-progress" class="h-full progress-fill w-0 bg-emerald-500 shadow-[0_0_15px_rgba(16,185,129,0.3)]"></div>
        </div>
        
        <div class="flex justify-between mt-3">
            <p id="budget-status-text" class="text-[10px] font-bold uppercase text-slate-500 italic">Caricamento budget...</p>
            <p id="budget-rimanente" class="text-[10px] font-black uppercase text-white tracking-widest"></p>
        </div>
    </div>

    <div class="apple-glass p-6 rounded-[2rem] mb-6 flex flex-wrap gap-4">
        <select id="filtro-incarico" onchange="applicaFiltri()" class="flex-1 p-3 rounded-xl text-xs font-bold outline-none"><option value="">Incarico: Tutti</option></select>
        <select id="filtro-tipologia" onchange="applicaFiltri()" class="flex-1 p-3 rounded-xl text-xs font-bold outline-none"><option value="">Tipologia: Tutte</option></select>
    </div>

    <div class="apple-glass rounded-[2rem] overflow-hidden shadow-2xl">
        <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="border-b border-white/10 bg-white/5">
                        <th class="p-5 text-[10px] font-black uppercase tracking-widest text-slate-400">Data</th>
                        <th class="p-5 text-[10px] font-black uppercase tracking-widest text-slate-400">Incarico</th>
                        <th class="p-5 text-[10px] font-black uppercase tracking-widest text-slate-400">Tipologia</th>
                        <th class="p-5 text-[10px] font-black uppercase tracking-widest text-slate-400">Descrizione</th>
                        <th class="p-5 text-[10px] font-black uppercase tracking-widest text-slate-400 text-right">Importo</th>
                        <th class="p-5 text-[10px] font-black uppercase tracking-widest text-slate-400 text-center">Azione</th>
                    </tr>
                </thead>
                <tbody id="tabella-corpo"></tbody>
            </table>
        </div>
    </div>
    <div id="loader" class="flex justify-center mt-10"><div class="w-6 h-6 border-2 border-emerald-500/20 border-t-emerald-500 rounded-full animate-spin"></div></div>
</div>

<script>
    const SB_URL = 'https://wleaywzitgcenbhumhov.supabase.co'; 
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndsZWF5d3ppdGdjZW5iaHVtaG92Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyMjExNzAsImV4cCI6MjA4OTc5NzE3MH0.d2RR17hiqtD-8wJ81DT9zlWgqcMFasW6fpvO25pSwfQ';
    const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

    let datiOriginali = [];
    const oggi = new Date();
    const meseCorrente = oggi.getMonth() + 1;
    const annoCorrente = oggi.getFullYear();

    async function inizializza() {
        await Promise.all([fetchCosti(), fetchBudget()]);
    }

    async function fetchCosti() {
        try {
            const { data, error } = await supabaseClient.from('gestione_costi').select('*').order('data_spesa', { ascending: false });
            if (error) throw error;
            datiOriginali = data;
            popolaFiltri(data);
            renderTabella(data);
            calcolaSpesaMeseCorrente();
        } catch (err) { console.error(err); }
        finally { document.getElementById('loader').classList.add('hidden'); }
    }

    async function fetchBudget() {
        const { data } = await supabaseClient.from('budget_mensile')
            .select('importo_budget').eq('anno', annoCorrente).eq('mese', meseCorrente).maybeSingle();
        
        const budget = data ? data.importo_budget : 0;
        document.getElementById('label-totale-budget').innerText = `su € ${parseFloat(budget).toLocaleString('it-IT', {minimumFractionDigits: 2})}`;
        window.currentBudget = budget;
        aggiornaGraficaBudget();
    }

    async function impostaBudget() {
        const nuovo = prompt("Inserisci il budget totale per questo mese (€):", window.currentBudget || 0);
        if (nuovo !== null) {
            const { error } = await supabaseClient.from('budget_mensile').upsert({
                anno: annoCorrente, mese: meseCorrente, importo_budget: parseFloat(nuovo)
            }, { onConflict: 'anno,mese' });
            if (!error) fetchBudget();
        }
    }

    function calcolaSpesaMeseCorrente() {
        // Sommiamo solo le USCITE (importi negativi) del mese corrente
        const speso = datiOriginali.filter(item => {
            const d = new Date(item.data_spesa);
            return (d.getMonth() + 1) === meseCorrente && d.getFullYear() === annoCorrente && item.importo < 0;
        }).reduce((acc, item) => acc + Math.abs(item.importo), 0);

        window.currentSpeso = speso;
        document.getElementById('label-speso').innerText = `€ ${speso.toLocaleString('it-IT', {minimumFractionDigits: 2})}`;
        aggiornaGraficaBudget();
    }

    function aggiornaGraficaBudget() {
        const budget = window.currentBudget || 0;
        const speso = window.currentSpeso || 0;
        const prog = document.getElementById('budget-progress');
        const statusText = document.getElementById('budget-status-text');
        const rimanente = document.getElementById('budget-rimanente');
        
        if (budget === 0) {
            prog.style.width = '0%';
            statusText.innerText = "Budget non impostato per questo mese";
            return;
        }

        const perc = Math.min((speso / budget) * 100, 100);
        prog.style.width = `${perc}%`;

        // Colori barra
        if (perc < 70) { prog.className = 'h-full progress-fill bg-emerald-500 shadow-[0_0_15px_rgba(16,185,129,0.3)]'; statusText.innerText = "Situazione Sotto Controllo"; statusText.className = "text-[10px] font-bold uppercase text-emerald-500 italic"; }
        else if (perc < 100) { prog.className = 'h-full progress-fill bg-orange-500 shadow-[0_0_15px_rgba(249,115,22,0.3)]'; statusText.innerText = "Attenzione, limite vicino"; statusText.className = "text-[10px] font-bold uppercase text-orange-500 italic"; }
        else { prog.className = 'h-full progress-fill bg-red-600 shadow-[0_0_15px_rgba(220,38,38,0.5)] animate-pulse'; statusText.innerText = "BUDGET SUPERATO!"; statusText.className = "text-[10px] font-black uppercase text-red-500 italic"; }

        rimanente.innerText = speso > budget ? `SFORATO DI € ${(speso-budget).toFixed(2)}` : `RIMANENTI: € ${(budget-speso).toFixed(2)}`;
    }

    // Le funzioni popolaFiltri, applicaFiltri, renderTabella e exportToExcel rimangono simili alle precedenti ma ottimizzate...
    function popolaFiltri(data) {
        const incarichi = [...new Set(data.map(item => item.incaricoa).filter(Boolean))].sort();
        const tipologie = [...new Set(data.map(item => item.tipologia).filter(Boolean))].sort();
        const selInc = document.getElementById('filtro-incarico');
        const selTip = document.getElementById('filtro-tipologia');
        incarichi.forEach(inc => selInc.add(new Option(`Incarico: ${inc}`, inc)));
        tipologie.forEach(tip => selTip.add(new Option(`Tipologia: ${tip}`, tip)));
    }

    function applicaFiltri() {
        const valInc = document.getElementById('filtro-incarico').value;
        const valTip = document.getElementById('filtro-tipologia').value;
        const filtrati = datiOriginali.filter(item => (valInc === "" || item.incaricoa === valInc) && (valTip === "" || item.tipologia === valTip));
        renderTabella(filtrati);
    }

    function renderTabella(costi) {
        const corpo = document.getElementById('tabella-corpo');
        let html = '';
        costi.forEach(item => {
            const val = parseFloat(item.importo);
            html += `
                <tr class="table-row border-b border-white/5 transition-colors">
                    <td class="p-5 text-xs font-bold text-white">${new Date(item.data_spesa).toLocaleDateString('it-IT')}</td>
                    <td class="p-5 text-[10px] font-black text-slate-400 uppercase tracking-wider">${item.incaricoa || '-'}</td>
                    <td class="p-5"><span class="px-3 py-1 bg-white/5 border border-white/10 rounded-full text-[10px] text-emerald-500 font-black uppercase">${item.tipologia}</span></td>
                    <td class="p-5 text-sm text-slate-300">${item.descrizione || '-'}</td>
                    <td class="p-5 text-right font-black ${val >= 0 ? 'text-positive' : 'text-negative'}">€ ${val.toFixed(2)}</td>
                    <td class="p-5 text-center"><a href="modifica_spesa.html?id=${item.id}" class="text-blue-400 hover:scale-125 transition-transform inline-block"><i class="fas fa-edit"></i></a></td>
                </tr>`;
        });
        corpo.innerHTML = html || '<tr><td colspan="6" class="p-10 text-center text-slate-500">Nessun dato</td></tr>';
    }

    function exportToExcel() {
        const dataRows = datiOriginali.map(i => ({ Data: i.data_spesa, Incarico: i.incaricoa, Tipo: i.tipologia, Desc: i.descrizione, Importo: i.importo }));
        const ws = XLSX.utils.json_to_sheet(dataRows);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Spese");
        XLSX.writeFile(wb, "Export_Spese.xlsx");
    }

    window.onload = inizializza;
</script>
</body>
</html>
