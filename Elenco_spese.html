<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestione Costi | Elenco</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            background: radial-gradient(circle at top left, #0f172a, #020617);
            color: #f8fafc; min-height: 100vh;
        }
        .apple-glass {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .progress-container { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255,255,255,0.1); }
        .progress-fill { transition: width 1s cubic-bezier(0.4, 0, 0.2, 1); }
        
        select { background: rgba(255, 255, 255, 0.05) !important; color: white !important; border: 1px solid rgba(255,255,255,0.1) !important; }
        .table-row:hover { background: rgba(255, 255, 255, 0.05); }
        .text-positive { color: #10b981 !important; }
        .text-negative { color: #ef4444 !important; }

        /* Stili per il raggruppamento */
        .year-header { cursor: pointer; background: rgba(255,255,255,0.03); transition: all 0.3s; }
        .year-header:hover { background: rgba(255,255,255,0.08); }
        .month-header { cursor: pointer; background: rgba(255,255,255,0.01); transition: all 0.3s; }
        .month-header:hover { background: rgba(255,255,255,0.05); }
        .collapsed-content { display: none; }
        .rotate-icon { transition: transform 0.3s; }
        .is-open .rotate-icon { transform: rotate(90deg); }
    </style>
</head>
<body class="p-4 md:p-12">

<div class="max-w-7xl mx-auto">
    <div class="flex flex-col md:flex-row items-center justify-between mb-8 gap-6">
        <div>
            <h1 class="text-3xl font-black uppercase tracking-tighter text-emerald-500">Gestione <span class="text-white">Costi</span></h1>
            <p class="text-slate-500 text-xs font-bold uppercase tracking-widest text-center md:text-left">Archivio Movimenti</p>
        </div>
        <div class="flex flex-wrap justify-center gap-3">
            <button onclick="exportToExcel()" class="bg-blue-600 hover:bg-blue-500 text-white px-5 py-2.5 rounded-xl font-bold text-[10px] uppercase transition-all shadow-lg shadow-blue-900/20">
                <i class="fas fa-file-excel mr-2"></i> Export
            </button>
            <a href="Nuova_spesa.html" class="bg-emerald-600 hover:bg-emerald-500 text-white px-5 py-2.5 rounded-xl font-bold text-[10px] uppercase transition-all shadow-lg shadow-emerald-900/20">
                <i class="fas fa-plus mr-2"></i> Aggiungi
            </a>
            <a href="gestione_budget.html" class="apple-glass px-5 py-2.5 rounded-xl font-bold text-[10px] uppercase hover:bg-white/10 transition-all flex items-center">
                <i class="fas fa-cog mr-2"></i> Imposta Budget
            </a>
        </div>
    </div>

    <div class="apple-glass p-6 rounded-[2rem] mb-6 flex flex-wrap gap-4">
        <select id="filtro-incarico" onchange="applicaFiltri()" class="flex-1 p-3 rounded-xl text-xs font-bold outline-none">
            <option value="">Incarico: Tutti</option>
        </select>
        <select id="filtro-tipologia" onchange="applicaFiltri()" class="flex-1 p-3 rounded-xl text-xs font-bold outline-none">
            <option value="">Tipologia: Tutte</option>
        </select>
    </div>

    <div id="main-content-area" class="space-y-6"></div>

    <div id="loader" class="flex justify-center mt-10"><div class="w-6 h-6 border-2 border-emerald-500/20 border-t-emerald-500 rounded-full animate-spin"></div></div>
</div>

<script>
    const SB_URL = 'https://wleaywzitgcenbhumhov.supabase.co'; 
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndsZWF5d3ppdGdjZW5iaHVtaG92Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyMjExNzAsImV4cCI6MjA4OTc5NzE3MH0.d2RR17hiqtD-8wJ81DT9zlWgqcMFasW6fpvO25pSwfQ';
    const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

    let datiOriginali = [];
    let datiBudget = [];
    const nomiMesi = ["Gennaio", "Febbraio", "Marzo", "Aprile", "Maggio", "Giugno", "Luglio", "Agosto", "Settembre", "Ottobre", "Novembre", "Dicembre"];

    async function init() {
        await Promise.all([fetchCosti(), fetchTuttiBudget()]);
        renderStruttura(datiOriginali);
    }

    async function fetchCosti() {
        try {
            const { data, error } = await supabaseClient.from('gestione_costi').select('*').order('data_spesa', { ascending: false });
            if (error) throw error;
            datiOriginali = data;
            popolaFiltri(data);
        } catch (err) { console.error(err); }
        finally { document.getElementById('loader').classList.add('hidden'); }
    }

    async function fetchTuttiBudget() {
        const { data } = await supabaseClient.from('configurazione_budget').select('*');
        datiBudget = data || [];
    }

    function popolaFiltri(data) {
        const incarichi = [...new Set(data.map(item => item.incaricoa).filter(Boolean))].sort();
        const tipologie = [...new Set(data.map(item => item.tipologia).filter(Boolean))].sort();
        const sI = document.getElementById('filtro-incarico');
        const sT = document.getElementById('filtro-tipologia');
        incarichi.forEach(i => sI.add(new Option(`Incarico: ${i}`, i)));
        tipologie.forEach(t => sT.add(new Option(`Tipo: ${t}`, t)));
    }

    function applicaFiltri() {
        const vI = document.getElementById('filtro-incarico').value;
        const vT = document.getElementById('filtro-tipologia').value;
        const filtrati = datiOriginali.filter(i => (vI === "" || i.incaricoa === vI) && (vT === "" || i.tipologia === vT));
        renderStruttura(filtrati);
    }

    function toggleSection(id) {
        const content = document.getElementById(id);
        const header = content.previousElementSibling;
        content.classList.toggle('collapsed-content');
        header.classList.toggle('is-open');
    }

    function renderStruttura(costi) {
        const area = document.getElementById('main-content-area');
        area.innerHTML = '';

        if (costi.length === 0) {
            area.innerHTML = '<div class="apple-glass p-10 text-center text-slate-500 font-bold rounded-[2rem]">Nessun dato trovato</div>';
            return;
        }

        // Raggruppamento dati
        const grouped = {};
        costi.forEach(item => {
            const d = new Date(item.data_spesa);
            const y = d.getFullYear();
            const m = d.getMonth() + 1;
            if (!grouped[y]) grouped[y] = {};
            if (!grouped[y][m]) grouped[y][m] = [];
            grouped[y][m].push(item);
        });

        const years = Object.keys(grouped).sort((a, b) => b - a);

        years.forEach(year => {
            const yearId = `year-${year}`;
            let yearHtml = `
                <div class="year-wrapper">
                    <div onclick="toggleSection('${yearId}')" class="year-header apple-glass p-6 rounded-[2rem] flex items-center justify-between mb-2">
                        <h2 class="text-2xl font-black tracking-tighter text-white"><i class="fas fa-chevron-right mr-4 rotate-icon"></i> ${year}</h2>
                        <span class="text-xs font-bold text-slate-500 uppercase tracking-widest">${Object.keys(grouped[year]).length} Mesi registrati</span>
                    </div>
                    <div id="${yearId}" class="collapsed-content space-y-4 ml-4 md:ml-8 mt-4 mb-8">
            `;

            const months = Object.keys(grouped[year]).sort((a, b) => b - a);
            months.forEach(month => {
                const monthId = `month-${year}-${month}`;
                const speseMese = grouped[year][month];
                
                // Calcolo Budget per questo specifico mese
                const budgetObj = datiBudget.find(b => b.anno == year && b.mese == month);
                const budgetVal = budgetObj ? parseFloat(budgetObj.importo_budget) : 0;
                const spesaTotale = speseMese.filter(i => i.importo < 0).reduce((acc, i) => acc + Math.abs(i.importo), 0);
                const perc = budgetVal > 0 ? Math.min((spesaTotale / budgetVal) * 100, 100) : 0;

                yearHtml += `
                    <div class="month-wrapper">
                        <div onclick="toggleSection('${monthId}')" class="month-header apple-glass p-5 rounded-[1.5rem] flex flex-col gap-4">
                            <div class="flex items-center justify-between">
                                <h3 class="text-lg font-bold text-emerald-400"><i class="fas fa-chevron-right mr-3 rotate-icon text-xs"></i> ${nomiMesi[month-1]}</h3>
                                <div class="text-right">
                                    <span class="text-[10px] font-black text-slate-500 uppercase">Spesa:</span>
                                    <span class="text-sm font-black text-white ml-1">€ ${spesaTotale.toLocaleString('it-IT', {minimumFractionDigits:2})}</span>
                                </div>
                            </div>
                            
                            <div class="w-full">
                                <div class="flex justify-between text-[9px] font-black uppercase tracking-tighter mb-1">
                                    <span class="${perc >= 100 ? 'text-red-500' : 'text-slate-400'}">${budgetVal > 0 ? perc.toFixed(0) + '%' : 'Budget non impostato'}</span>
                                    <span class="text-slate-500 italic">${budgetVal > 0 ? 'Residuo: € ' + (budgetVal - spesaTotale).toFixed(2) : ''}</span>
                                </div>
                                <div class="w-full h-1.5 progress-container rounded-full overflow-hidden">
                                    <div class="h-full progress-fill ${perc >= 100 ? 'bg-red-600' : (perc > 80 ? 'bg-orange-500' : 'bg-emerald-500')}" style="width: ${perc}%"></div>
                                </div>
                            </div>
                        </div>

                        <div id="${monthId}" class="collapsed-content mt-3 px-2">
                            <div class="apple-glass rounded-[1.5rem] overflow-hidden">
                                <table class="w-full text-left border-collapse">
                                    <tbody class="divide-y divide-white/5">
                                        ${speseMese.map(item => {
                                            const v = parseFloat(item.importo);
                                            return `
                                                <tr class="table-row">
                                                    <td class="p-4 text-[10px] font-bold text-white w-24">${new Date(item.data_spesa).toLocaleDateString('it-IT', {day:'2-digit', month:'2-digit'})}</td>
                                                    <td class="p-4 text-[10px] font-black text-slate-400 uppercase tracking-tight hidden md:table-cell">${item.incaricoa || '-'}</td>
                                                    <td class="p-4"><span class="px-2 py-0.5 bg-white/5 border border-white/10 rounded-full text-[9px] text-emerald-500 font-black uppercase">${item.tipologia}</span></td>
                                                    <td class="p-4 text-xs text-slate-300 max-w-[150px] truncate">${item.descrizione || '-'}</td>
                                                    <td class="p-4 text-right font-black text-xs ${v >= 0 ? 'text-positive' : 'text-negative'}">€ ${v.toFixed(2)}</td>
                                                    <td class="p-4 text-center"><a href="modifica_spesa.html?id=${item.id}" class="text-blue-400 hover:scale-125 transition-transform inline-block"><i class="fas fa-edit text-xs"></i></a></td>
                                                </tr>
                                            `;
                                        }).join('')}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                `;
            });

            yearHtml += `</div></div>`;
            area.innerHTML += yearHtml;
        });
    }

    function exportToExcel() {
        const rows = datiOriginali.map(i => ({ Data: i.data_spesa, Incarico: i.incaricoa, Tipo: i.tipologia, Desc: i.descrizione, Importo: i.importo }));
        const ws = XLSX.utils.json_to_sheet(rows);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Spese");
        XLSX.writeFile(wb, "Report_Spese_Completo.xlsx");
    }

    window.onload = init;
</script>
</body>
</html>
