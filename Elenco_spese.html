<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestione Costi | Elenco</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            background: radial-gradient(circle at top left, #0f172a, #020617);
            color: #f8fafc; min-height: 100vh;
        }
        .apple-glass {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .table-row:hover { background: rgba(255, 255, 255, 0.05); }
        .year-divider {
            background: rgba(255, 255, 255, 0.05);
            border-left: 4px solid #3b82f6;
            cursor: pointer;
            transition: background 0.2s;
        }
        .month-divider {
            background: linear-gradient(90deg, rgba(16, 185, 129, 0.1) 0%, transparent 100%);
            border-left: 4px solid #10b981;
            cursor: pointer;
        }
        .hidden-section { display: none !important; }
        .chevron-icon { transition: transform 0.3s; }
        .chevron-rotate { transform: rotate(-90deg); }
        .btn-edit {
            color: #3b82f6;
            transition: all 0.2s;
        }
        .btn-edit:hover { color: #60a5fa; transform: scale(1.2); }
    </style>
</head>
<body class="p-4 md:p-12">

<div class="max-w-6xl mx-auto">
    <div class="flex flex-col md:flex-row items-center justify-between mb-10 gap-6">
        <div>
            <h1 class="text-3xl font-black uppercase tracking-tighter text-emerald-500">Gestione <span class="text-white">Costi</span></h1>
            <p class="text-slate-500 text-xs font-bold uppercase tracking-widest">Archivio Movimenti</p>
        </div>
        <div class="flex gap-3">
            <a href="Nuova_spesa.html" class="bg-emerald-600 hover:bg-emerald-500 text-white px-6 py-3 rounded-2xl font-bold text-xs uppercase transition-all flex items-center">
                <i class="fas fa-plus mr-2"></i> Aggiungi
            </a>
            <a href="Riepilogo_statistiche.html" class="apple-glass px-6 py-3 rounded-2xl font-bold text-xs uppercase hover:bg-white/10 transition-all flex items-center">
                <i class="fas fa-chart-line mr-2"></i> Dashboard
            </a>
        </div>
    </div>

    <div class="apple-glass rounded-[2rem] overflow-hidden mb-10">
        <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="border-b border-white/10 bg-white/5">
                        <th class="p-5 text-[10px] font-black uppercase tracking-widest text-slate-400">Data Spesa</th>
                        <th class="p-5 text-[10px] font-black uppercase tracking-widest text-slate-400">Tipologia</th>
                        <th class="p-5 text-[10px] font-black uppercase tracking-widest text-slate-400">Descrizione</th>
                        <th class="p-5 text-[10px] font-black uppercase tracking-widest text-slate-400 text-right">Importo</th>
                        <th class="p-5 text-[10px] font-black uppercase tracking-widest text-slate-400 text-center">Azioni</th>
                    </tr>
                </thead>
                <tbody id="tabella-corpo"></tbody>
            </table>
        </div>
    </div>

    <div id="loader" class="flex flex-col items-center justify-center mt-20">
        <div class="w-8 h-8 border-4 border-emerald-500/20 border-t-emerald-500 rounded-full animate-spin mb-4"></div>
    </div>
</div>

<script>
    const SB_URL = 'https://wleaywzitgcenbhumhov.supabase.co'; 
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndsZWF5d3ppdGdjZW5iaHVtaG92Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyMjExNzAsImV4cCI6MjA4OTc5NzE3MH0.d2RR17hiqtD-8wJ81DT9zlWgqcMFasW6fpvO25pSwfQ';
    const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

    async function fetchCosti() {
        try {
            const { data, error } = await supabaseClient
                .from('gestione_costi')
                .select('*')
                .order('data_spesa', { ascending: false });

            if (error) throw error;
            renderTabella(data);
        } catch (err) {
            document.getElementById('tabella-corpo').innerHTML = `<tr><td colspan="5" class="p-10 text-center text-red-400">Errore caricamento</td></tr>`;
        } finally {
            document.getElementById('loader').classList.add('hidden');
        }
    }

    function toggleYear(year) {
        const icon = document.getElementById(`icon-year-${year}`);
        const isClosing = !icon.classList.contains('chevron-rotate');
        icon.classList.toggle('chevron-rotate');
        const children = document.querySelectorAll(`.year-group-${year}`);
        children.forEach(child => {
            if (isClosing) child.classList.add('hidden-section');
            else {
                child.classList.remove('hidden-section');
                if (child.classList.contains('table-row')) {
                    const mId = child.getAttribute('data-parent-month');
                    if (document.getElementById(`icon-month-${mId}`).classList.contains('chevron-rotate')) child.classList.add('hidden-section');
                }
            }
        });
    }

    function toggleMonth(monthId) {
        const icon = document.getElementById(`icon-month-${monthId}`);
        icon.classList.toggle('chevron-rotate');
        document.querySelectorAll(`.month-group-${monthId}`).forEach(row => row.classList.toggle('hidden-section'));
    }

    function renderTabella(costi) {
        const corpo = document.getElementById('tabella-corpo');
        const currentYear = new Date().getFullYear().toString();
        let html = '';
        const report = {};

        costi.forEach(item => {
            const d = new Date(item.data_spesa);
            const y = d.getFullYear();
            const m = d.toLocaleString('it-IT', { month: 'long' });
            const mKey = `${m} ${y}`;
            if (!report[y]) report[y] = { total: 0, months: {} };
            if (!report[y].months[mKey]) report[y].months[mKey] = { total: 0, items: [] };
            report[y].total += parseFloat(item.importo) || 0;
            report[y].months[mKey].total += parseFloat(item.importo) || 0;
            report[y].months[mKey].items.push(item);
        });

        Object.keys(report).sort((a,b) => b-a).forEach(year => {
            const isCurrentYear = year === currentYear;
            html += `
                <tr class="year-divider" onclick="toggleYear('${year}')">
                    <td colspan="3" class="p-4 font-black text-blue-400 uppercase text-sm">
                        <i id="icon-year-${year}" class="fas fa-chevron-down mr-2 chevron-icon ${isCurrentYear ? '' : 'chevron-rotate'}"></i> ANNO ${year}
                    </td>
                    <td class="p-4 text-right font-black text-white">€ ${report[year].total.toFixed(2)}</td>
                    <td></td>
                </tr>
            `;

            Object.keys(report[year].months).forEach(mLabel => {
                const mId = mLabel.replace(/\s+/g, '-');
                html += `
                    <tr class="month-divider year-group-${year} ${isCurrentYear ? '' : 'hidden-section'}" onclick="toggleMonth('${mId}')">
                        <td colspan="3" class="p-4 pl-10 text-xs font-bold text-emerald-400 uppercase">
                            <i id="icon-month-${mId}" class="fas fa-chevron-down mr-2 chevron-icon"></i> ${mLabel}
                        </td>
                        <td class="p-4 text-right font-black text-white text-sm">€ ${report[year].months[mLabel].total.toFixed(2)}</td>
                        <td></td>
                    </tr>
                `;

                report[year].months[mLabel].items.forEach(item => {
                    html += `
                        <tr class="table-row border-b border-white/5 year-group-${year} month-group-${mId} ${isCurrentYear ? '' : 'hidden-section'}" data-parent-month="${mId}">
                            <td class="p-5 text-xs font-bold text-white">${new Date(item.data_spesa).toLocaleDateString('it-IT')}</td>
                            <td class="p-5"><span class="px-3 py-1 bg-white/5 border border-white/10 rounded-full text-[10px] text-emerald-500 font-black uppercase">${item.tipologia}</span></td>
                            <td class="p-5 text-sm text-slate-300">${item.descrizione || '-'}</td>
                            <td class="p-5 text-right font-black text-emerald-400">€ ${parseFloat(item.importo).toFixed(2)}</td>
                            <td class="p-5 text-center">
                                <a href="modifica_spesa.html?id=${item.id}" class="btn-edit"><i class="fas fa-edit"></i></a>
                            </td>
                        </tr>
                    `;
                });
            });
        });
        corpo.innerHTML = html;
    }
    window.onload = fetchCosti;
</script>
</body>
</html>
