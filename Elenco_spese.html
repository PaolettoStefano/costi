<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestione Costi | Elenco</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            background: radial-gradient(circle at top left, #0f172a, #020617);
            color: #f8fafc; min-height: 100vh;
        }
        .apple-glass {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .table-row:hover { background: rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body class="p-4 md:p-12">

<div class="max-w-6xl mx-auto">
    <div class="flex flex-col md:flex-row items-center justify-between mb-10 gap-6">
        <div>
            <h1 class="text-3xl font-black uppercase tracking-tighter text-emerald-500">Gestione <span class="text-white">Costi</span></h1>
            <p class="text-slate-500 text-xs font-bold uppercase tracking-widest">Archivio Movimenti</p>
        </div>
        <div class="flex gap-3">
            <a href="Nuova_spesa.html" class="bg-emerald-600 hover:bg-emerald-500 text-white px-6 py-3 rounded-2xl font-bold text-xs uppercase transition-all flex items-center">
                <i class="fas fa-plus mr-2"></i> Aggiungi Spesa
            </a>
            <a href="Riepilogo_statistiche.html" class="apple-glass px-6 py-3 rounded-2xl font-bold text-xs uppercase hover:bg-white/10 transition-all flex items-center">
                <i class="fas fa-chart-line mr-2"></i> Dashboard
            </a>
        </div>
    </div>

    <div class="apple-glass rounded-[2rem] overflow-hidden">
        <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="border-b border-white/10 bg-white/5">
                        <th class="p-5 text-[10px] font-black uppercase tracking-widest text-slate-400">Data Spesa</th>
                        <th class="p-5 text-[10px] font-black uppercase tracking-widest text-slate-400">Descrizione</th>
                        <th class="p-5 text-[10px] font-black uppercase tracking-widest text-slate-400 text-right">Importo</th>
                        <th class="p-5 text-[10px] font-black uppercase tracking-widest text-slate-400 text-right">Inserito il</th>
                    </tr>
                </thead>
                <tbody id="tabella-corpo">
                    </tbody>
            </table>
        </div>
    </div>

    <div id="loader" class="flex flex-col items-center justify-center mt-20">
        <div class="w-8 h-8 border-4 border-emerald-500/20 border-t-emerald-500 rounded-full animate-spin mb-4"></div>
    </div>
</div>

<script>
    // Configurazione Supabase (Usa le stesse credenziali del progetto consumi)
    const SB_URL = 'https://zddtqkvbmqpnxtsflexl.supabase.co'; 
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpkZHRxa3ZibXFwbnh0c2ZsZXhsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0MTIwMDcsImV4cCI6MjA4ODk4ODAwN30.irCKDABvILPdlDbHYrQ06gtPWaa6-95q5lNx2GGKQec';
    const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

    async function fetchCosti() {
        try {
            const { data, error } = await supabaseClient
                .from('gestione_costi')
                .select('*')
                .order('data_spesa', { ascending: false });

            if (error) throw error;
            renderTabella(data);
        } catch (err) {
            console.error('Errore:', err.message);
            document.getElementById('tabella-corpo').innerHTML = `<tr><td colspan="4" class="p-10 text-center text-red-400">Errore nel caricamento dati</td></tr>`;
        } finally {
            document.getElementById('loader').classList.add('hidden');
        }
    }

    function renderTabella(costi) {
        const corpo = document.getElementById('tabella-corpo');
        if (costi.length === 0) {
            corpo.innerHTML = `<tr><td colspan="4" class="p-10 text-center text-slate-500 uppercase text-xs font-bold tracking-widest">Nessuna spesa registrata</td></tr>`;
            return;
        }

        corpo.innerHTML = costi.map(item => {
            const dSpesa = new Date(item.data_spesa).toLocaleDateString('it-IT', { day: '2-digit', month: '2-digit', year: 'numeric' });
            const dCreazione = new Date(item.data_creazione).toLocaleDateString('it-IT', { day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' });
            
            return `
                <tr class="table-row border-b border-white/5 transition-colors">
                    <td class="p-5">
                        <span class="font-bold text-white">${dSpesa}</span>
                    </td>
                    <td class="p-5">
                        <p class="text-sm text-slate-300 font-medium">${item.descrizione || '-'}</p>
                    </td>
                    <td class="p-5 text-right">
                        <span class="text-emerald-400 font-black">€ ${parseFloat(item.importo).toFixed(2)}</span>
                    </td>
                    <td class="p-5 text-right text-[10px] text-slate-500 font-mono">
                        ${dCreazione}
                    </td>
                </tr>
            `;
        }).join('');
    }

    window.onload = fetchCosti;
</script>

</body>
</html>
