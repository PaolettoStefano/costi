<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestione Costi | Nuova Spesa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            background: radial-gradient(circle at top left, #0f172a, #020617);
            color: #f8fafc; min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
        }
        .apple-glass {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        input, textarea, select {
            background: rgba(255, 255, 255, 0.05) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            color: white !important;
        }
        input:focus, select:focus { border-color: #10b981 !important; outline: none; }
        option { background: #0f172a; color: white; }
        .btn-loading { pointer-events: none; opacity: 0.6; }

        /* Stile per il toggle completato */
        .status-toggle {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            user-select: none;
            padding: 12px;
            border-radius: 16px;
            transition: background 0.3s;
        }
        .status-toggle:hover { background: rgba(255,255,255,0.05); }
    </style>
</head>
<body class="p-6">

<div class="w-full max-w-md">
    <div class="text-center mb-8">
        <h1 class="text-3xl font-black uppercase tracking-tighter text-emerald-500">Nuovo <span class="text-white">Movimento</span></h1>
    </div>

    <div class="apple-glass p-8 rounded-[2.5rem]">
        <form id="form-spesa" class="space-y-5">
            <div>
                <label class="block text-[10px] font-black uppercase tracking-widest text-slate-400 mb-2">Data</label>
                <input type="date" id="data_spesa" required class="w-full p-4 rounded-2xl text-sm">
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-[10px] font-black uppercase tracking-widest text-slate-400 mb-2">Incarico</label>
                    <select id="incaricoa" required class="w-full p-4 rounded-2xl text-sm cursor-pointer">
                        <option value="" disabled selected>Caricamento...</option>
                    </select>
                </div>
                <div>
                    <label class="block text-[10px] font-black uppercase tracking-widest text-slate-400 mb-2">Tipologia</label>
                    <select id="tipologia" onchange="aggiornaColoreImporto()" required class="w-full p-4 rounded-2xl text-sm cursor-pointer">
                        <option value="" disabled selected>Caricamento...</option>
                    </select>
                </div>
            </div>

            <div>
                <label class="block text-[10px] font-black uppercase tracking-widest text-slate-400 mb-2">Descrizione</label>
                <textarea id="descrizione" rows="2" placeholder="Dettagli..." required class="w-full p-4 rounded-2xl text-sm resize-none"></textarea>
            </div>

            <div>
                <label class="block text-[10px] font-black uppercase tracking-widest text-slate-400 mb-2">Importo (€)</label>
                <input type="number" id="importo" step="0.01" placeholder="0.00" required class="w-full p-4 rounded-2xl text-xl font-black transition-colors duration-300 text-white">
                <p id="info-segno" class="text-[9px] text-slate-500 mt-2 ml-1 uppercase font-bold italic">Seleziona una categoria</p>
            </div>

            <div class="pt-2">
                <label class="block text-[10px] font-black uppercase tracking-widest text-slate-400 mb-2">Stato Pagamento</label>
                <div onclick="toggleStatusUI()" class="status-toggle border border-white/10 bg-white/5">
                    <div id="status-icon-container" class="w-10 h-10 rounded-full flex items-center justify-center bg-red-500/20">
                        <i id="status-icon" class="fas fa-times text-red-500"></i>
                    </div>
                    <div>
                        <p id="status-text" class="text-xs font-black uppercase tracking-tight text-red-500">Non Completato</p>
                        <p class="text-[9px] text-slate-500 font-bold uppercase">Clicca per cambiare</p>
                    </div>
                    <input type="hidden" id="completato_val" value="no">
                </div>
            </div>

            <div class="flex flex-col gap-3 pt-4">
                <button type="button" onclick="saveData(true)" id="btn-save-new" class="w-full bg-white/10 hover:bg-white/20 text-white font-bold py-4 rounded-2xl uppercase tracking-widest text-[10px] border border-white/10">
                    Salva e Aggiungi Altra
                </button>
                <button type="button" onclick="saveData(false)" id="btn-save-exit" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-black py-5 rounded-2xl uppercase tracking-widest text-xs shadow-lg shadow-emerald-900/20">
                    Salva e Vai alla Lista
                </button>
            </div>
        </form>
    </div>
</div>

<div id="toast" class="fixed bottom-10 left-1/2 transform -translate-x-1/2 apple-glass px-8 py-4 rounded-full border-emerald-500/50 hidden z-50">
    <p class="text-xs font-bold text-emerald-400 uppercase tracking-widest">Registrato!</p>
</div>

<script>
    const SB_URL = 'https://wleaywzitgcenbhumhov.supabase.co'; 
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndsZWF5d3ppdGdjZW5iaHVtaG92Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyMjExNzAsImV4cCI6MjA4OTc5NzE3MH0.d2RR17hiqtD-8wJ81DT9zlWgqcMFasW6fpvO25pSwfQ';
    const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

    let mappaSegni = {};
    document.getElementById('data_spesa').valueAsDate = new Date();

    async function loadInitialData() {
        await Promise.all([loadTipologie(), loadIncarichi()]);
    }

    // Gestione visiva del nuovo campo completato
    function toggleStatusUI() {
        const valInput = document.getElementById('completato_val');
        const iconContainer = document.getElementById('status-icon-container');
        const icon = document.getElementById('status-icon');
        const text = document.getElementById('status-text');

        if (valInput.value === 'no') {
            valInput.value = 'si';
            iconContainer.classList.replace('bg-red-500/20', 'bg-emerald-500/20');
            icon.className = 'fas fa-check text-emerald-500';
            text.innerText = 'Completato';
            text.classList.replace('text-red-500', 'text-emerald-500');
        } else {
            valInput.value = 'no';
            iconContainer.classList.replace('bg-emerald-500/20', 'bg-red-500/20');
            icon.className = 'fas fa-times text-red-500';
            text.innerText = 'Non Completato';
            text.classList.replace('text-emerald-500', 'text-red-500');
        }
    }

    async function loadTipologie() {
        try {
            const { data, error } = await supabaseClient.from('tipologia_spesa').select('descrizione, segno').order('descrizione');
            if (error) throw error;
            const select = document.getElementById('tipologia');
            select.innerHTML = '<option value="" disabled selected>Categoria</option>';
            data.forEach(tipo => {
                mappaSegni[tipo.descrizione] = Number(tipo.segno);
                const opt = new Option(tipo.descrizione, tipo.descrizione);
                select.add(opt);
            });
        } catch (err) { console.error(err); }
    }

    async function loadIncarichi() {
        const select = document.getElementById('incaricoa');
        try {
            const { data, error } = await supabaseClient.from('in_carico').select('incaricoa').order('incaricoa');
            if (error) throw error;
            select.innerHTML = '<option value="" disabled selected>Incarico</option>';
            data.forEach(item => {
                if (item.incaricoa) select.add(new Option(item.incaricoa, item.incaricoa));
            });
        } catch (err) { console.error(err); }
    }

    function aggiornaColoreImporto() {
        const tipo = document.getElementById('tipologia').value;
        const inputImp = document.getElementById('importo');
        const info = document.getElementById('info-segno');
        const segno = mappaSegni[tipo];

        if (segno === 1) {
            inputImp.classList.remove('text-red-400', 'text-white');
            inputImp.classList.add('text-emerald-400');
            info.innerText = "Verrà salvato come ENTRATA (+)";
            info.classList.replace('text-slate-500', 'text-emerald-500');
        } else {
            inputImp.classList.remove('text-emerald-400', 'text-white');
            inputImp.classList.add('text-red-400');
            info.innerText = "Verrà salvato come USCITA (-)";
            info.classList.replace('text-emerald-500', 'text-slate-500');
        }
    }

    async function saveData(keepOpening) {
        const fields = {
            desc: document.getElementById('descrizione'),
            imp: document.getElementById('importo'),
            data: document.getElementById('data_spesa'),
            tipo: document.getElementById('tipologia'),
            inc: document.getElementById('incaricoa'),
            comp: document.getElementById('completato_val')
        };

        if(!fields.desc.value || !fields.imp.value || !fields.tipo.value || !fields.inc.value) {
            alert("Compila tutti i campi!"); return;
        }

        const valoreInserito = parseFloat(fields.imp.value);
        const importoFinale = valoreInserito * (mappaSegni[fields.tipo.value] || -1);

        try {
            const { error } = await supabaseClient.from('gestione_costi').insert([{
                data_spesa: fields.data.value,
                descrizione: fields.desc.value,
                importo: importoFinale,
                tipologia: fields.tipo.value,
                incaricoa: fields.inc.value,
                completato: fields.comp.value // INVIO DEL NUOVO CAMPO
            }]);

            if (error) throw error;

            showToast();
            if (keepOpening) {
                fields.desc.value = ''; fields.imp.value = ''; 
                fields.tipo.selectedIndex = 0; fields.inc.selectedIndex = 0;
                fields.imp.classList.remove('text-emerald-400', 'text-red-400');
                fields.imp.classList.add('text-white');
                // Reset toggle UI
                if(fields.comp.value === 'si') toggleStatusUI(); 
            } else {
                setTimeout(() => window.location.href = 'Elenco_spese.html', 800);
            }
        } catch (err) { alert(err.message); }
    }

    function showToast() {
        const t = document.getElementById('toast');
        t.classList.remove('hidden');
        setTimeout(() => t.classList.add('hidden'), 2000);
    }

    window.onload = loadInitialData;
</script>
</body>
</html>
