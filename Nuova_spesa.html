<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestione Costi | Nuova Spesa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            background: radial-gradient(circle at top left, #0f172a, #020617);
            color: #f8fafc; min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
        }
        .apple-glass {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        input, textarea, select {
            background: rgba(255, 255, 255, 0.05) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            color: white !important;
            transition: all 0.3s;
        }
        input:focus, select:focus, textarea:focus { 
            border-color: #10b981 !important; 
            outline: none; 
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.2); 
        }
        option { background: #0f172a; color: white; }
        .btn-loading { pointer-events: none; opacity: 0.6; }
    </style>
</head>
<body class="p-6">

<div class="w-full max-w-md">
    <div class="text-center mb-8">
        <h1 class="text-3xl font-black uppercase tracking-tighter text-emerald-500">Nuova <span class="text-white">Spesa</span></h1>
        <p class="text-slate-500 text-[10px] font-black uppercase tracking-[0.3em] mt-2">Registrazione Movimento</p>
    </div>

    <div class="apple-glass p-8 rounded-[2.5rem]">
        <form id="form-spesa" class="space-y-5">
            <div>
                <label class="block text-[10px] font-black uppercase tracking-widest text-slate-400 mb-2 ml-1">Data Operazione</label>
                <input type="date" id="data_spesa" required class="w-full p-4 rounded-2xl text-sm">
            </div>

            <div>
                <label class="block text-[10px] font-black uppercase tracking-widest text-slate-400 mb-2 ml-1">Tipologia Spesa</label>
                <select id="tipologia" required class="w-full p-4 rounded-2xl text-sm appearance-none cursor-pointer">
                    <option value="" disabled selected>Caricamento categorie...</option>
                </select>
            </div>

            <div>
                <label class="block text-[10px] font-black uppercase tracking-widest text-slate-400 mb-2 ml-1">Descrizione</label>
                <textarea id="descrizione" rows="2" placeholder="Cosa hai comprato?" required class="w-full p-4 rounded-2xl text-sm resize-none"></textarea>
            </div>

            <div>
                <label class="block text-[10px] font-black uppercase tracking-widest text-slate-400 mb-2 ml-1">Importo (€)</label>
                <input type="number" id="importo" step="0.01" placeholder="0.00" required class="w-full p-4 rounded-2xl text-xl font-black text-emerald-400">
                <p class="text-[9px] text-slate-500 mt-2 ml-1 uppercase font-bold italic">* L'importo verrà salvato in negativo come spesa</p>
            </div>

            <div class="flex flex-col gap-3 pt-2">
                <button type="button" onclick="saveData(true)" id="btn-save-new" class="w-full bg-white/10 hover:bg-white/20 text-white font-bold py-4 rounded-2xl uppercase tracking-widest text-[10px] transition-all flex items-center justify-center gap-2 border border-white/10">
                    <i class="fas fa-plus-circle"></i> Salva e Aggiungi Altra
                </button>
                
                <button type="button" onclick="saveData(false)" id="btn-save-exit" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-black py-5 rounded-2xl uppercase tracking-widest text-xs transition-all flex items-center justify-center gap-3">
                    <i class="fas fa-check"></i> Salva e Vai alla Lista
                </button>
            </div>
        </form>

        <div class="mt-8 pt-6 border-t border-white/5 flex justify-center">
            <a href="Elenco_spese.html" class="text-[10px] font-black uppercase tracking-widest text-slate-500 hover:text-white transition-colors">
                <i class="fas fa-times mr-1"></i> Annulla e torna indietro
            </a>
        </div>
    </div>
</div>

<div id="toast" class="fixed bottom-10 left-1/2 transform -translate-x-1/2 apple-glass px-8 py-4 rounded-full border-emerald-500/50 hidden z-50">
    <p class="text-xs font-bold text-emerald-400 flex items-center uppercase tracking-widest">
        <i class="fas fa-check-circle mr-2 text-lg"></i> Registrato!
    </p>
</div>

<script>
    const SB_URL = 'https://wleaywzitgcenbhumhov.supabase.co'; 
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndsZWF5d3ppdGdjZW5iaHVtaG92Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyMjExNzAsImV4cCI6MjA4OTc5NzE3MH0.d2RR17hiqtD-8wJ81DT9zlWgqcMFasW6fpvO25pSwfQ';
    const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

    document.getElementById('data_spesa').valueAsDate = new Date();

    async function loadTipologie() {
        try {
            const { data, error } = await supabaseClient
                .from('tipologia_spesa')
                .select('descrizione')
                .order('descrizione', { ascending: true });

            if (error) throw error;

            const select = document.getElementById('tipologia');
            select.innerHTML = '<option value="" disabled selected>Seleziona categoria</option>';
            
            data.forEach(tipo => {
                const opt = document.createElement('option');
                opt.value = tipo.descrizione;
                opt.textContent = tipo.descrizione;
                select.appendChild(opt);
            });
        } catch (err) {
            console.error("Errore tipologie:", err.message);
        }
    }

    async function saveData(keepOpening) {
        const btnNew = document.getElementById('btn-save-new');
        const btnExit = document.getElementById('btn-save-exit');
        const descInput = document.getElementById('descrizione');
        const impInput = document.getElementById('importo');
        const dataInput = document.getElementById('data_spesa');
        const tipoInput = document.getElementById('tipologia');

        if(!descInput.value || !impInput.value || !tipoInput.value) {
            alert("Compila tutti i campi!");
            return;
        }

        btnNew.classList.add('btn-loading');
        btnExit.classList.add('btn-loading');

        // CALCOLO IMPORTO: Moltiplico per -1 per registrarlo come costo (negativo)
        const importoNegativo = parseFloat(impInput.value) * -1;

        const nuovaSpesa = {
            data_spesa: dataInput.value,
            descrizione: descInput.value,
            importo: importoNegativo, // Salvato come negativo
            tipologia: tipoInput.value
        };

        try {
            const { error } = await supabaseClient.from('gestione_costi').insert([nuovaSpesa]);
            if (error) throw error;

            showToast();

            if (keepOpening) {
                descInput.value = '';
                impInput.value = '';
                tipoInput.selectedIndex = 0;
                descInput.focus();
            } else {
                setTimeout(() => window.location.href = 'Elenco_spese.html', 800);
            }

        } catch (err) {
            alert("Errore: " + err.message);
        } finally {
            btnNew.classList.remove('btn-loading');
            btnExit.classList.remove('btn-loading');
        }
    }

    function showToast() {
        const toast = document.getElementById('toast');
        toast.classList.remove('hidden');
        setTimeout(() => toast.classList.add('hidden'), 2000);
    }

    window.onload = loadTipologie;
</script>

</body>
</html>
