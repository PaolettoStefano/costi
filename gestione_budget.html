<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestione Budget | Configurazione</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            background: radial-gradient(circle at top left, #0f172a, #020617);
            color: #f8fafc; min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
        }
        .apple-glass {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        input, select {
            background: rgba(255, 255, 255, 0.05) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            color: white !important;
        }
        input:focus, select:focus { border-color: #3b82f6 !important; outline: none; }
        option { background: #0f172a; }
        .btn-save {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            transition: all 0.3s ease;
        }
        .btn-save:hover { transform: translateY(-2px); shadow: 0 10px 20px rgba(37, 99, 235, 0.3); }
    </style>
</head>
<body class="p-6">

<div class="w-full max-w-2xl">
    <div class="text-center mb-8">
        <h1 class="text-3xl font-black uppercase tracking-tighter text-blue-500">Configurazione <span class="text-white">Budget</span></h1>
        <p class="text-slate-500 text-[10px] font-bold uppercase tracking-[0.3em] mt-2">Pianificazione Mensile</p>
    </div>

    <div class="apple-glass p-8 rounded-[2.5rem] mb-8">
        <form id="form-budget" class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div>
                <label class="block text-[10px] font-black uppercase tracking-widest text-slate-400 mb-2">Mese</label>
                <select id="mese" required class="w-full p-4 rounded-2xl text-sm font-bold cursor-pointer">
                    <option value="1">Gennaio</option>
                    <option value="2">Febbraio</option>
                    <option value="3">Marzo</option>
                    <option value="4">Aprile</option>
                    <option value="5">Maggio</option>
                    <option value="6">Giugno</option>
                    <option value="7">Luglio</option>
                    <option value="8">Agosto</option>
                    <option value="9">Settembre</option>
                    <option value="10">Ottobre</option>
                    <option value="11">Novembre</option>
                    <option value="12">Dicembre</option>
                </select>
            </div>
            <div>
                <label class="block text-[10px] font-black uppercase tracking-widest text-slate-400 mb-2">Anno</label>
                <input type="number" id="anno" required class="w-full p-4 rounded-2xl text-sm font-bold">
            </div>
            <div>
                <label class="block text-[10px] font-black uppercase tracking-widest text-slate-400 mb-2">Importo (€)</label>
                <input type="number" id="importo_budget" step="0.01" placeholder="0.00" required class="w-full p-4 rounded-2xl text-sm font-bold">
            </div>
            <div class="md:col-span-3 flex gap-4">
                <button type="submit" class="flex-1 btn-save text-white font-black py-4 rounded-2xl uppercase tracking-widest text-xs">
                    Salva Budget
                </button>
                <a href="Elenco_spese.html" class="px-8 bg-white/5 hover:bg-white/10 border border-white/10 rounded-2xl flex items-center justify-center transition-all">
                    <i class="fas fa-arrow-left text-white"></i>
                </a>
            </div>
        </form>
    </div>

    <div class="apple-glass rounded-[2.5rem] overflow-hidden">
        <div class="p-6 border-b border-white/10 bg-white/5 text-center md:text-left">
            <h2 class="text-[10px] font-black uppercase tracking-widest text-slate-300">Budget Salvati</h2>
        </div>
        <div class="overflow-x-auto">
            <table class="w-full text-left">
                <thead>
                    <tr class="text-[9px] font-black uppercase tracking-widest text-slate-500 border-b border-white/5">
                        <th class="p-5">Periodo</th>
                        <th class="p-5 text-right">Budget</th>
                        <th class="p-5 text-center">Azioni</th>
                    </tr>
                </thead>
                <tbody id="lista-budget">
                    </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const SB_URL = 'https://wleaywzitgcenbhumhov.supabase.co'; 
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndsZWF5d3ppdGdjZW5iaHVtaG92Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyMjExNzAsImV4cCI6MjA4OTc5NzE3MH0.d2RR17hiqtD-8wJ81DT9zlWgqcMFasW6fpvO25pSwfQ';
    const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

    const form = document.getElementById('form-budget');
    const listaBudget = document.getElementById('lista-budget');

    // Funzione per inizializzare i campi dal URL o dalla data corrente
    function initFields() {
        const urlParams = new URLSearchParams(window.location.search);
        const urlMese = urlParams.get('mese');
        const urlAnno = urlParams.get('anno');
        
        const d = new Date();
        
        // Se i parametri sono nel URL usa quelli, altrimenti data odierna
        document.getElementById('mese').value = urlMese ? urlMese : (d.getMonth() + 1);
        document.getElementById('anno').value = urlAnno ? urlAnno : d.getFullYear();
        
        // Se siamo arrivati qui con parametri specifici, proviamo a caricare l'importo esistente
        if(urlMese && urlAnno) {
            checkExistingBudget(urlMese, urlAnno);
        }
    }

    async function checkExistingBudget(m, a) {
        const { data, error } = await supabaseClient
            .from('configurazione_budget')
            .select('importo_budget')
            .eq('mese', parseInt(m))
            .eq('anno', parseInt(a))
            .maybeSingle();
        
        if (data) {
            document.getElementById('importo_budget').value = data.importo_budget;
        }
    }

    async function loadBudgets() {
        const { data, error } = await supabaseClient
            .from('configurazione_budget')
            .select('*')
            .order('anno', { ascending: false })
            .order('mese', { ascending: false });

        if (error) return;

        listaBudget.innerHTML = data.map(b => `
            <tr class="border-b border-white/5 hover:bg-white/5 transition-colors">
                <td class="p-5 text-xs font-bold uppercase tracking-tight text-white">
                    ${getNomeMese(b.mese)} ${b.anno}
                </td>
                <td class="p-5 text-right font-black text-blue-400 text-sm">
                    € ${parseFloat(b.importo_budget).toLocaleString('it-IT', {minimumFractionDigits: 2})}
                </td>
                <td class="p-5 text-center">
                    <button onclick="deleteBudget('${b.id}')" class="text-red-400/50 hover:text-red-400 transition-colors">
                        <i class="fas fa-trash-alt"></i>
                    </button>
                </td>
            </tr>
        `).join('');
    }

    form.onsubmit = async (e) => {
        e.preventDefault();
        const payload = {
            mese: parseInt(document.getElementById('mese').value),
            anno: parseInt(document.getElementById('anno').value),
            importo_budget: parseFloat(document.getElementById('importo_budget').value)
        };

        const { error } = await supabaseClient
            .from('configurazione_budget')
            .upsert(payload, { onConflict: 'anno,mese' });

        if (error) alert("Errore: " + error.message);
        else {
            alert("Budget salvato correttamente!");
            loadBudgets();
        }
    };

    async function deleteBudget(id) {
        if (confirm("Eliminare questo budget?")) {
            await supabaseClient.from('configurazione_budget').delete().eq('id', id);
            loadBudgets();
        }
    }

    function getNomeMese(m) {
        const mesi = ["Gennaio", "Febbraio", "Marzo", "Aprile", "Maggio", "Giugno", "Luglio", "Agosto", "Settembre", "Ottobre", "Novembre", "Dicembre"];
        return mesi[m - 1];
    }

    window.onload = () => {
        initFields();
        loadBudgets();
    };
</script>
</body>
</html>
