<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modifica Spesa | Extreme Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #020617; color: white; min-height: 100vh; }
        .apple-glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        input, select { background: rgba(255,255,255,0.05) !important; border: 1px solid rgba(255,255,255,0.1) !important; color: white !important; }
        option { background: #0f172a; color: white; }
        .loading-shimmer { position: relative; overflow: hidden; }
        .loading-shimmer::after { content: ""; position: absolute; top: 0; left: -150%; width: 150%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent); animation: shimmer 2s infinite; }
        @keyframes shimmer { 100% { left: 100%; } }
    </style>
</head>
<body class="p-6 flex items-center justify-center">

<div class="max-w-md w-full apple-glass p-8 rounded-[2.5rem] shadow-2xl">
    <div class="mb-8">
        <h1 class="text-2xl font-black uppercase text-emerald-500">Modifica <span class="text-white">Record</span></h1>
        <p class="text-slate-500 text-[10px] font-bold uppercase tracking-[0.2em]">Aggiornamento database istantaneo</p>
    </div>

    <div id="form-container" class="space-y-6">
        <input type="hidden" id="record-id-field">
        
        <div>
            <label class="block text-[10px] font-black uppercase text-slate-500 mb-2 ml-1">Data</label>
            <input type="date" id="data_spesa" class="w-full p-4 rounded-2xl outline-none focus:border-emerald-500 transition-all">
        </div>

        <div>
            <label class="block text-[10px] font-black uppercase text-slate-500 mb-2 ml-1">Tipologia</label>
            <select id="tipologia" class="w-full p-4 rounded-2xl outline-none cursor-pointer">
                <option value="">Caricamento in corso...</option>
            </select>
        </div>

        <div>
            <label class="block text-[10px] font-black uppercase text-slate-500 mb-2 ml-1">Descrizione</label>
            <input type="text" id="descrizione" placeholder="..." class="w-full p-4 rounded-2xl outline-none">
        </div>

        <div>
            <label class="block text-[10px] font-black uppercase text-slate-500 mb-2 ml-1">Importo (€)</label>
            <input type="number" step="0.01" id="importo" placeholder="0.00" class="w-full p-4 rounded-2xl outline-none text-xl font-bold text-emerald-400">
        </div>

        <div class="flex gap-4 pt-4">
            <button id="btn-update" class="flex-1 bg-emerald-600 hover:bg-emerald-500 p-4 rounded-2xl font-black uppercase text-xs transition-transform active:scale-95 shadow-lg shadow-emerald-900/20">
                Salva Modifiche
            </button>
            <a href="Elenco_spese.html" class="flex-1 bg-white/5 hover:bg-white/10 p-4 rounded-2xl font-black uppercase text-xs text-center transition-all flex items-center justify-center">
                Annulla
            </a>
        </div>
    </div>
</div>

<script>
    const SB_URL = 'https://wleaywzitgcenbhumhov.supabase.co'; 
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndsZWF5d3ppdGdjZW5iaHVtaG92Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyMjExNzAsImV4cCI6MjA4OTc5NzE3MH0.d2RR17hiqtD-8wJ81DT9zlWgqcMFasW6fpvO25pSwfQ';
    const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

    const params = new URLSearchParams(window.location.search);
    const targetId = params.get('id');

    async function bootstrap() {
        if (!targetId) {
            alert("Nessun ID specificato nell'URL!");
            return;
        }

        try {
            // 1. Fetch Tipologie
            const { data: tipi, error: errTipi } = await supabaseClient.from('tipologia_spesa').select('descrizione').order('descrizione');
            if (errTipi) throw errTipi;

            const select = document.getElementById('tipologia');
            select.innerHTML = tipi.map(t => `<option value="${t.descrizione}">${t.descrizione}</option>`).join('');

            // 2. Fetch Record
            const { data: rec, error: errRec } = await supabaseClient.from('gestione_costi').select('*').eq('id', targetId).single();
            if (errRec) throw errRec;

            // 3. Fill Fields
            document.getElementById('record-id-field').value = rec.id;
            document.getElementById('data_spesa').value = rec.data_spesa;
            document.getElementById('descrizione').value = rec.descrizione || '';
            document.getElementById('importo').value = Math.abs(rec.importo); // Mostra positivo
            select.value = rec.tipologia;

        } catch (e) {
            console.error("Errore Bootstrap:", e);
            alert("Errore caricamento dati: " + e.message);
        }
    }

    // NUOVA METODOLOGIA: Event Listener diretto sul bottone invece del form.submit
    document.getElementById('btn-update').addEventListener('click', async () => {
        const btn = document.getElementById('btn-update');
        
        // Raccolta dati
        const id = document.getElementById('record-id-field').value;
        const data_spesa = document.getElementById('data_spesa').value;
        const tipologia = document.getElementById('tipologia').value;
        const descrizione = document.getElementById('descrizione').value;
        const importoRaw = parseFloat(document.getElementById('importo').value);
        
        // Validazione minima
        if(!data_spesa || !tipologia || isNaN(importoRaw)) {
            alert("Compila tutti i campi obbligatori!");
            return;
        }

        // Stato loading
        btn.disabled = true;
        btn.innerText = "Sincronizzazione...";
        btn.classList.add('loading-shimmer');

        // Forza importo negativo (essendo una spesa)
        const importoFinale = importoRaw > 0 ? importoRaw * -1 : importoRaw;

        try {
            console.log("Tentativo di aggiornamento per ID:", id);
            
            const { data, error, status } = await supabaseClient
                .from('gestione_costi')
                .update({
                    data_spesa,
                    tipologia,
                    descrizione,
                    importo: importoFinale
                })
                .eq('id', id)
                .select(); // Chiediamo il record indietro per confermare il successo

            if (error) throw error;

            console.log("Risposta Supabase:", status, data);
            
            if (status === 200 || status === 204) {
                // Successo atomico
                window.location.href = 'Elenco_spese.html';
            } else {
                throw new Error("Aggiornamento non confermato dal server.");
            }

        } catch (err) {
            console.error("ERRORE CRITICO SALVATAGGIO:", err);
            alert("Non è stato possibile salvare: " + (err.message || "Errore sconosciuto"));
            
            btn.disabled = false;
            btn.innerText = "Riprova Salva";
            btn.classList.remove('loading-shimmer');
        }
    });

    // Avvio
    window.addEventListener('DOMContentLoaded', bootstrap);
</script>
</body>
</html>
