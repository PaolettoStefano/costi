<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor Spesa v2.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #020617; color: white; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .glass-card { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 2rem; }
        input, select { background: rgba(255,255,255,0.05) !important; border: 1px solid rgba(255,255,255,0.1) !important; color: white !important; transition: 0.3s; }
        input:focus, select:focus { border-color: #10b981 !important; outline: none; box-shadow: 0 0 15px rgba(16, 185, 129, 0.1); }
        option { background: #020617; color: white; }
    </style>
</head>
<body class="p-4">

<div class="w-full max-w-md glass-card p-8 shadow-2xl">
    <div class="mb-8 text-center">
        <h1 class="text-2xl font-black uppercase tracking-tighter text-emerald-500">Modifica <span class="text-white">Dati</span></h1>
        <div class="h-1 w-12 bg-emerald-500 mx-auto mt-2 rounded-full"></div>
    </div>

    <div class="space-y-5">
        <div>
            <label class="block text-[10px] font-bold uppercase text-slate-500 mb-2 ml-1">Data Spesa</label>
            <input type="date" id="field-data" class="w-full p-4 rounded-xl text-sm">
        </div>

        <div>
            <label class="block text-[10px] font-bold uppercase text-slate-500 mb-2 ml-1">Categoria (Tipologia)</label>
            <select id="field-tipologia" class="w-full p-4 rounded-xl text-sm appearance-none">
                <option value="">Caricamento...</option>
            </select>
        </div>

        <div>
            <label class="block text-[10px] font-bold uppercase text-slate-500 mb-2 ml-1">Descrizione</label>
            <input type="text" id="field-descrizione" placeholder="Es: Spesa settimanale" class="w-full p-4 rounded-xl text-sm">
        </div>

        <div>
            <label class="block text-[10px] font-bold uppercase text-slate-500 mb-2 ml-1">Importo (€)</label>
            <input type="number" id="field-importo" step="0.01" placeholder="0.00" class="w-full p-4 rounded-xl text-lg font-bold text-emerald-400">
            <p class="text-[9px] text-slate-500 mt-2 italic ml-1">* Verrà registrato come uscita (negativo)</p>
        </div>

        <div class="flex flex-col gap-3 pt-4">
            <button id="btn-save" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-black py-4 rounded-xl uppercase text-xs tracking-widest transition-all shadow-lg shadow-emerald-900/20">
                <i class="fas fa-save mr-2"></i> Conferma Modifica
            </button>
            <a href="Elenco_spese.html" class="w-full bg-white/5 hover:bg-white/10 text-slate-400 font-bold py-4 rounded-xl uppercase text-[10px] text-center transition-all">
                Annulla e Torna Indietro
            </a>
        </div>
    </div>
</div>

<script>
    // --- CONFIGURAZIONE CONNESSIONE ---
    const SB_URL = 'https://wleaywzitgcenbhumhov.supabase.co'; 
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndsZWF5d3ppdGdjZW5iaHVtaG92Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyMjExNzAsImV4cCI6MjA4OTc5NzE3MH0.d2RR17hiqtD-8wJ81DT9zlWgqcMFasW6fpvO25pSwfQ';
    const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

    // --- LOGICA DI PAGINA ---
    const urlParams = new URLSearchParams(window.location.search);
    const recordId = urlParams.get('id');

    async function init() {
        if (!recordId) {
            alert("Nessun record selezionato.");
            window.location.href = 'Elenco_spese.html';
            return;
        }

        try {
            // 1. Carica le opzioni della tipologia dalla tabella dedicata
            const { data: tipologie, error: tErr } = await supabaseClient
                .from('tipologia_spesa')
                .select('descrizione')
                .order('descrizione');

            if (tErr) throw tErr;

            const selectElem = document.getElementById('field-tipologia');
            selectElem.innerHTML = tipologie.map(t => `<option value="${t.descrizione}">${t.descrizione}</option>`).join('');

            // 2. Carica i dati attuali della spesa
            const { data: record, error: rErr } = await supabaseClient
                .from('gestione_costi')
                .select('*')
                .eq('id', recordId)
                .single();

            if (rErr) throw rErr;

            // 3. Popola i campi
            document.getElementById('field-data').value = record.data_spesa;
            document.getElementById('field-descrizione').value = record.descrizione;
            document.getElementById('field-tipologia').value = record.tipologia;
            // Mostriamo l'importo come positivo (Math.abs) per la modifica
            document.getElementById('field-importo').value = Math.abs(record.importo);

        } catch (err) {
            console.error("Errore inizializzazione:", err);
            alert("Errore nel caricamento: " + err.message);
        }
    }

    // --- AZIONE DI SALVATAGGIO ---
    document.getElementById('btn-save').addEventListener('click', async () => {
        const btn = document.getElementById('btn-save');
        
        // Raccolta Valori
        const vData = document.getElementById('field-data').value;
        const vTipo = document.getElementById('field-tipologia').value;
        const vDesc = document.getElementById('field-descrizione').value;
        const vImpRaw = parseFloat(document.getElementById('field-importo').value);

        if (!vData || !vTipo || isNaN(vImpRaw)) {
            alert("Tutti i campi sono obbligatori!");
            return;
        }

        // Calcolo Importo: Trasforma sempre in negativo (Spesa)
        const vImportoFinale = vImpRaw > 0 ? vImpRaw * -1 : vImpRaw;

        // UI Loading
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> Salvataggio...';

        try {
            const { error } = await supabaseClient
                .from('gestione_costi')
                .update({
                    data_spesa: vData,
                    tipologia: vTipo,
                    descrizione: vDesc,
                    importo: vImportoFinale
                })
                .eq('id', recordId);

            if (error) throw error;

            // Successo: Torna alla lista
            window.location.href = 'Elenco_spese.html';

        } catch (err) {
            alert("Errore durante il salvataggio: " + err.message);
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-save mr-2"></i> Conferma Modifica';
        }
    });

    // Avvio al caricamento del DOM
    document.addEventListener('DOMContentLoaded', init);
</script>

</body>
</html>
